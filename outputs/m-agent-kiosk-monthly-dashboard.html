<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M Agent Executive Analytics Dashboard</title>
  <style>
    :root{
      color-scheme:light;
      --bg:#f7f8fa;
      --card:#ffffff;
      --ink:#0f172a;
      --muted:#667085;
      --soft:#98a2b3;
      --line:#e6eaf0;
      --line-2:#f0f2f6;
      --blue:#2563eb;
      --blue-2:#60a5fa;
      --blue-soft:#eff6ff;
      --green:#12b76a;
      --green-soft:#ecfdf3;
      --rose:#e11d48;
      --rose-soft:#fff1f3;
      --amber:#f59e0b;
      --amber-soft:#fffbeb;
      --purple:#7c3aed;
      --cyan:#0891b2;
      --radius:20px;
      --shadow:0 18px 48px rgba(15,23,42,.07),0 2px 10px rgba(15,23,42,.04);
      --shadow-soft:0 10px 28px rgba(15,23,42,.055);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background:var(--bg);
      color:var(--ink);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;min-width:320px;background:var(--bg);overflow-x:hidden;line-height:1.5}
    button,input,select{font:inherit}
    button{cursor:pointer}
    h1,h2,h3,p{margin:0}
    .card,.summary-card,.sidebar,.workspace,.comparison-table-wrap{min-width:0}
    .card *,.summary-card *,.sidebar *,.comparison-table-wrap *{min-width:0}
    .card svg,.summary-card svg{flex:0 0 auto}
    .brand-mark{width:52px;height:52px;border-radius:18px;background:#fff;box-shadow:0 10px 28px rgba(15,23,42,.12),inset 0 0 0 1px rgba(255,255,255,.72);overflow:hidden;flex:0 0 auto}
    .brand-mark img{width:100%;height:100%;object-fit:cover;object-position:50% 22%;display:block;transform:scale(1.08)}
    .brand-name{display:block!important;color:var(--ink);font-weight:850;letter-spacing:0;white-space:nowrap}
    .brand-name .brand-m{color:#d71920}
    .brand-name .brand-agent{color:#111827}
    .field{display:grid;gap:5px;color:var(--muted);font-size:11px;font-weight:750}
    select,input{border:1px solid #d9e1ec;border-radius:14px;background:#fff;color:var(--ink);outline:none;transition:.2s ease}
    select{height:42px;min-width:154px;padding:0 34px 0 12px}
    input{height:46px;padding:0 14px;width:100%}
    select:focus,input:focus{border-color:#93b4ff;box-shadow:0 0 0 4px rgba(37,99,235,.1)}
    .hero{display:grid;grid-template-columns:minmax(0,1fr);gap:24px;margin-bottom:24px}
    .hero-copy{min-height:320px;border-radius:20px;padding:32px;background:linear-gradient(135deg,#ffffff 0%,#f8fbff 100%);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.8);display:grid;align-content:space-between;overflow:hidden;position:relative}
    .hero-copy:after{content:"";position:absolute;inset:auto 0 0 0;height:5px;background:linear-gradient(90deg,var(--blue),var(--cyan),var(--green))}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;color:var(--blue);font-size:12px;text-transform:uppercase;font-weight:850;letter-spacing:0}
    .pulse{width:8px;height:8px;border-radius:99px;background:var(--green);box-shadow:0 0 0 6px rgba(18,183,106,.12)}
    h1{max-width:960px;margin-top:16px;font-size:32px;line-height:1.15;letter-spacing:0;text-wrap:balance}
    .hero-copy p{max-width:820px;margin-top:16px;color:#475467;font-size:15px;line-height:1.6;text-wrap:pretty}
    .hero-actions{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
    .hero-chip,.source-chip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;background:#fff;padding:10px 14px;color:#344054;font-size:13px;font-weight:700;text-decoration:none;transition:border-color .18s ease,box-shadow .18s ease,transform .18s ease,background .18s ease}
    button.hero-chip{appearance:none}
    .hero-chip:hover,.hero-chip:focus-visible{border-color:#93c5fd;box-shadow:0 10px 24px rgba(37,99,235,.12);transform:translateY(-1px)}
    .hero-chip:focus-visible{outline:3px solid rgba(37,99,235,.18);outline-offset:2px}
    .hero-chip.primary{border-color:#bfdbfe;background:var(--blue-soft);color:#1d4ed8}
    .hero-visual{min-height:320px;border-radius:20px;background:#fff;color:var(--ink);overflow:hidden;box-shadow:var(--shadow);border:1px solid rgba(230,234,240,.92);padding:24px;display:grid;position:relative}
    .hero-visual:before{content:"";position:absolute;inset:0 0 auto 0;height:5px;background:linear-gradient(90deg,var(--blue),var(--blue-2))}
    .hero-visual-copy{display:grid;align-content:space-between;gap:22px;position:relative}
    .hero-visual-copy b{font-size:24px;line-height:1.2;letter-spacing:0}
    .hero-visual-copy p{margin-top:10px;color:#667085;font-size:14px;line-height:1.6;text-wrap:pretty}
    .hero-score{border:1px solid var(--line-2);border-radius:20px;background:linear-gradient(180deg,#fbfdff,#f8fafc);padding:18px;display:grid;gap:12px}
    .hero-score-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
    .hero-score-head span{color:var(--muted);font-size:12px;font-weight:800}
    .hero-score-head strong{font-size:28px;line-height:1.08;letter-spacing:0}
    .hero-mini{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .hero-mini div{border:1px solid var(--line-2);border-radius:18px;padding:14px;background:#fbfcfe;min-width:0}
    .hero-mini strong{display:block;font-size:23px;line-height:1.05;letter-spacing:0}
    .hero-mini span{display:block;margin-top:7px;color:var(--muted);font-size:12px;line-height:1.35}
    .filter-row{display:grid;grid-template-columns:minmax(280px,520px) minmax(0,1fr);gap:16px;margin-bottom:24px}
    .search{position:relative}
    .search svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#98a2b3}
    .search input{padding-left:46px;border-radius:18px}
    .context-strip{min-height:46px;border:1px solid var(--line);border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:flex-end;gap:18px;padding:0 16px;color:#475467;font-size:13px;box-shadow:0 8px 30px rgba(15,23,42,.04)}
    .context-strip b{color:var(--ink)}
    .section{scroll-margin-top:96px;margin-bottom:48px}
    .section-head{display:flex;justify-content:space-between;gap:18px;align-items:end;margin:34px 2px 14px}
    .section-head h2{font-size:24px;line-height:1.2;letter-spacing:0;text-wrap:balance}
    .section-head p{margin-top:8px;color:var(--muted);font-size:14px;line-height:1.5}
    .section-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .bento{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:24px;align-items:stretch}
    .card{border:1px solid rgba(230,234,240,.92);border-radius:var(--radius);background:var(--card);box-shadow:var(--shadow-soft);padding:24px;min-width:0;transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease}
    .bento>.card{height:100%;display:flex;flex-direction:column}
    .card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:#dbe6f5}
    .success-grid{align-items:stretch}
    .success-grid>.card{min-height:360px;height:100%;display:flex;flex-direction:column}
    .success-grid>.card>.gauge-holder{flex:1;min-height:0}
    .success-grid>.card>.chart{margin-top:auto}
    .success-grid>.card>.kpi-value{margin-top:28px}
    .success-grid>.card>.subtitle:last-child{margin-top:auto}
    .span-12{grid-column:span 12}.span-8{grid-column:span 8}.span-7{grid-column:span 7}.span-6{grid-column:span 6}.span-5{grid-column:span 5}.span-4{grid-column:span 4}.span-3{grid-column:span 3}
    .card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
    .card-title{display:flex;align-items:center;gap:10px}
    .card-title h3{font-size:18px;line-height:1.25;letter-spacing:0;text-wrap:balance;overflow-wrap:anywhere;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .subtitle{color:var(--muted);font-size:14px;line-height:1.45;margin-top:5px;overflow-wrap:anywhere;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .icon{width:40px;height:40px;border-radius:14px;background:var(--blue-soft);color:var(--blue);display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
    .icon.dark{background:#111827;color:#fff}.icon.green{background:var(--green-soft);color:#067647}.icon.rose{background:var(--rose-soft);color:#be123c}.icon.amber{background:var(--amber-soft);color:#b45309}
    .kpi-grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:24px}
    .kpi-grid .kpi{grid-column:span 4}
    .kpi{min-height:220px;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:16px;align-content:stretch}
    .kpi-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .delta{display:inline-flex;align-items:center;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:850;background:var(--green-soft);color:#067647}
    .delta.down{background:var(--rose-soft);color:#be123c}
    .kpi-middle{display:flex;align-items:center;min-height:56px}
    .kpi-bottom{display:grid;gap:10px}
    .kpi-value{font-size:clamp(28px,3vw,48px);line-height:1.05;font-weight:850;letter-spacing:0;overflow-wrap:anywhere;word-break:break-word;max-width:100%}
    .kpi-label{color:#344054;font-size:14px;font-weight:800;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .kpi-note{color:var(--muted);font-size:12px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;overflow-wrap:anywhere}
    .spark{height:48px;width:100%;overflow:visible}
    .machine-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px}
    .machine-card{min-height:320px;padding:24px;display:grid;gap:16px;position:relative;overflow:hidden}
    .machine-card.selected{border-color:#93c5fd;box-shadow:0 26px 90px rgba(37,99,235,.14)}
    .machine-card:before{content:"";position:absolute;inset:0 0 auto 0;height:5px;background:linear-gradient(90deg,var(--blue),var(--blue-2));opacity:.9}
    .machine-photo{width:100%;aspect-ratio:4/3;border-radius:18px;overflow:hidden;border:1px solid var(--line-2);background:#f8fafc}
    .machine-photo img{width:100%;height:100%;object-fit:cover;display:block}
    .machine-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .machine-device{width:58px;height:58px;border-radius:18px;background:linear-gradient(135deg,#0f172a,#2563eb);display:grid;place-items:center;color:#fff;font-weight:850;letter-spacing:0;box-shadow:0 14px 32px rgba(37,99,235,.2)}
    .status{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:850}
    .status:before{content:"";width:7px;height:7px;border-radius:99px;background:currentColor}
    .status.Active{background:var(--green-soft);color:#067647}
    .status.Borrowed,.status.Event{background:var(--amber-soft);color:#b45309}
    .status.Maintenance{background:var(--rose-soft);color:#be123c}
    .status.Available,.status.Standby{background:#f2f4f7;color:#475467}
    .machine-id{font-size:14px;font-weight:850;color:#1d4ed8;overflow-wrap:anywhere}
    .machine-location{margin-top:7px;color:#344054;font-size:14px;line-height:1.5;min-height:42px;text-wrap:pretty;overflow-wrap:anywhere}
    .machine-stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .stat-tile{border:1px solid var(--line-2);border-radius:16px;background:#fbfcfe;padding:14px;min-width:0}
    .stat-tile strong{display:block;font-size:22px;line-height:1.08;letter-spacing:0;overflow-wrap:anywhere}
    .stat-tile span{display:block;margin-top:7px;color:var(--muted);font-size:11px}
    .micro{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--muted);font-size:12px}
    .click-hint{display:flex;align-items:center;gap:8px;color:#1d4ed8;font-size:12px;font-weight:800}
    .chart{width:100%;height:auto;display:block;overflow:visible;max-width:100%}
    .overview-trend-card,.overview-insights-card{min-height:520px}
    .overview-trend-card .chart{margin-top:auto}
    .overview-insights-card .exec-list{height:100%;align-content:stretch}
    .overview-insights-card .exec-list li{min-height:0}
    .overview-summary-card{min-height:0}
    .overview-summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .overview-summary-item{border:1px solid var(--line-2);border-radius:18px;background:#fbfcfe;padding:16px 18px;display:grid;gap:8px;align-content:start;min-width:0}
    .overview-summary-item span{color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase}
    .overview-summary-item strong{font-size:26px;line-height:1.05;letter-spacing:0;overflow-wrap:anywhere}
    .overview-summary-item p{margin:0;color:#475467;font-size:13px;line-height:1.45;overflow-wrap:anywhere}
    .overview-summary-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}
    .overview-summary-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .overview-machine-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .overview-machine-card{border:1px solid var(--line-2);border-radius:18px;background:#fbfcfe;padding:16px 18px;display:grid;gap:12px;align-content:start;min-width:0}
    .overview-machine-photo{width:100%;aspect-ratio:16/10;border-radius:16px;overflow:hidden;border:1px solid var(--line-2);background:#fff}
    .overview-machine-photo img{width:100%;height:100%;object-fit:cover;display:block}
    .overview-machine-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .overview-machine-head b{display:block;font-size:15px;line-height:1.35;overflow-wrap:anywhere}
    .overview-machine-head span{display:block;margin-top:5px;color:#667085;font-size:12px;line-height:1.4}
    .overview-machine-metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .overview-machine-metrics div{border-radius:14px;background:#fff;padding:12px}
    .overview-machine-metrics strong{display:block;font-size:20px;line-height:1.05;overflow-wrap:anywhere}
    .overview-machine-metrics span{display:block;margin-top:6px;color:var(--muted);font-size:11px}
    .reco-hero{display:grid;grid-template-columns:1fr;gap:24px}
    .reco-hero-card{min-height:0}
    .reco-hero-card .card-title{align-items:flex-start}
    .reco-period-chip{display:inline-flex;align-items:center;gap:10px;margin-top:10px;padding:10px 14px;border-radius:999px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;font-size:13px;font-weight:800;line-height:1.35}
    .reco-period-chip b{font-size:14px;color:#1e3a8a}
    .reco-summary-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:18px}
    .reco-kpi{border:1px solid var(--line-2);border-radius:18px;background:#fbfcfe;padding:18px;display:grid;gap:8px}
    .reco-kpi span{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase}
    .reco-kpi strong{font-size:30px;line-height:1.02;letter-spacing:0}
    .reco-kpi p{margin:0;color:#475467;font-size:13px;line-height:1.45}
    .reco-benefits{display:grid;gap:10px}
    .reco-benefit{border:1px solid var(--line-2);border-radius:16px;background:#fbfcfe;padding:14px 16px;display:grid;grid-template-columns:32px minmax(0,1fr);gap:12px;align-items:start}
    .reco-benefit .icon{width:32px;height:32px;border-radius:11px}
    .reco-benefit b{display:block;font-size:14px;line-height:1.3}
    .reco-benefit p{margin-top:4px;color:var(--muted);font-size:12px;line-height:1.45}
    .reco-summary-block{display:grid;gap:16px}
    .reco-summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .reco-summary-item{border:1px solid var(--line-2);border-radius:18px;background:#fbfcfe;padding:16px;display:grid;gap:8px;align-content:start}
    .reco-summary-item span{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase}
    .reco-summary-item b{font-size:15px;line-height:1.35;color:#101828}
    .reco-summary-item p{margin:0;color:#475467;font-size:13px;line-height:1.55}
    .reco-ranking-card{display:grid;gap:18px}
    .reco-ranking-list{display:grid;gap:12px}
    .reco-rank-row{display:grid;grid-template-columns:28px minmax(140px,220px) minmax(0,1fr) auto auto;gap:12px;align-items:center}
    .reco-rank-row b{font-size:14px;line-height:1.25;overflow-wrap:anywhere}
    .reco-rank-row span{font-size:12px;color:var(--muted)}
    .reco-rank-track{height:14px;border-radius:999px;background:#eef2f7;overflow:hidden}
    .reco-rank-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#2563eb,#60a5fa)}
    .reco-score-pill{display:inline-flex;align-items:center;justify-content:center;min-width:74px;padding:8px 12px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:13px;font-weight:850}
    .reco-badge{display:inline-flex;align-items:center;justify-content:center;min-width:82px;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:900;letter-spacing:0}
    .reco-badge.keep{background:var(--green-soft);color:#067647}
    .reco-badge.review{background:var(--amber-soft);color:#b45309}
    .reco-badge.remove{background:var(--rose-soft);color:#be123c}
    .reco-machine-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
    .reco-machine-card{padding:18px;display:grid;gap:16px;align-content:start}
    .reco-machine-photo{width:100%;aspect-ratio:16/10;border-radius:18px;overflow:hidden;border:1px solid var(--line-2);background:#f8fafc}
    .reco-machine-photo img{width:100%;height:100%;object-fit:cover;display:block}
    .reco-machine-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .reco-machine-head b{display:block;font-size:15px;line-height:1.3;overflow-wrap:anywhere}
    .reco-machine-head p{margin-top:6px;color:#667085;font-size:12px;line-height:1.45}
    .reco-score{display:grid;gap:4px;justify-items:end;text-align:right}
    .reco-score strong{font-size:32px;line-height:1}
    .reco-score span{font-size:12px;color:var(--muted);font-weight:750}
    .reco-metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .reco-metric{border:1px solid var(--line-2);border-radius:16px;background:#fbfcfe;padding:12px}
    .reco-metric span{display:block;color:var(--muted);font-size:11px}
    .reco-metric strong{display:block;margin-top:6px;font-size:20px;line-height:1.05}
    .reco-trend-line{font-size:12px;color:#475467;font-weight:750}
    .reco-reasons{display:grid;gap:8px}
    .reco-reasons li{list-style:none;border-radius:14px;background:#f8fafc;padding:11px 12px;color:#344054;font-size:12px;line-height:1.45}
    .reco-insight-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .reco-insight{border:1px solid var(--line-2);border-radius:18px;background:#fbfcfe;padding:16px;display:grid;grid-template-columns:40px minmax(0,1fr);gap:4px 12px;align-items:start}
    .reco-insight .icon{grid-row:1 / 3;width:40px;height:40px;border-radius:14px}
    .reco-insight b{font-size:15px;line-height:1.3}
    .reco-insight p{margin:0;color:var(--muted);font-size:13px;line-height:1.5}
    .axis-label{fill:#98a2b3;font-size:11px}
    .grid-line{stroke:#eef2f7;stroke-width:1}
    .area-fill{opacity:.16;animation:fadeIn .7s ease both}
    .draw-line{stroke-dasharray:1000;stroke-dashoffset:1000;animation:dash 1.2s ease forwards}
    @keyframes dash{to{stroke-dashoffset:0}}
    @keyframes fadeIn{from{opacity:0}to{opacity:.16}}
    .bar-animate{transform-origin:left center;animation:scaleX .9s ease both}
    @keyframes scaleX{from{transform:scaleX(0)}to{transform:scaleX(1)}}
    .donut-layout{display:grid;grid-template-columns:minmax(150px,176px) minmax(150px,1fr);gap:22px;align-items:center}
    .donut-card{overflow:hidden}
    .donut-card .donut-layout{grid-template-columns:minmax(128px,160px) minmax(0,1fr);gap:16px}
    .donut-card .donut{width:min(160px,100%)}
    .donut-card .legend-list{min-width:0}
    .donut-card .legend-item{grid-template-columns:auto minmax(0,1fr) auto;gap:8px}
    .donut-card .legend-item span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .donut{width:176px;height:auto;aspect-ratio:1 / 1;border-radius:50%;display:grid;place-items:center;position:relative;box-shadow:inset 0 0 0 1px rgba(15,23,42,.06);flex:0 0 auto;max-width:100%}
